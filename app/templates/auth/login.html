<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liga Control - Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0d0d0d;color:#fafafa;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-wrap{width:100%;max-width:400px;padding:20px}
    .logo{text-align:center;margin-bottom:32px}
    .logo-title{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#e8c547;letter-spacing:4px}
    .logo-sub{font-size:11px;color:#555;letter-spacing:4px;text-transform:uppercase;margin-top:4px}
    .card{background:#141414;border:1px solid #222;border-radius:16px;padding:32px}
    .card-title{font-size:15px;font-weight:500;color:#999;margin-bottom:24px;text-align:center}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:500}
    input{background:#0f0f0f;border:1px solid #252525;border-radius:8px;color:#ddd;font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;width:100%;transition:border .15s}
    input:focus{outline:none;border-color:#1a7a3c}
    .btn{width:100%;background:#1a7a3c;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:12px;cursor:pointer;transition:all .15s;margin-top:8px}
    .btn:hover{background:#2ecc71;color:#000}
    .alert{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px}
    .alert-danger{background:#2a0a0a;color:#e74c3c;border:1px solid #3a1515}
    .alert-success{background:#0f2e1a;color:#2ecc71;border:1px solid #1a4a28}
    .link{color:#555;font-size:12px;text-align:center;display:block;margin-top:18px;text-decoration:none}
    .link:hover{color:#aaa}
    .remember{display:flex;align-items:center;gap:8px;font-size:12px;color:#666}
    .remember input{width:auto;margin:0}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-title">⚽ LIGA</div>
    <div class="logo-sub">Control Total</div>
  </div>
  <div class="card">
    <div class="card-title">Iniciar sesión</div>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" required autofocus placeholder="nombre de usuario">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <label class="remember">
        <input type="checkbox" name="remember"> Recordarme
      </label>
      <button type="submit" class="btn">Entrar</button>
    </form>
    <a href="{{ url_for('auth.registro') }}" class="link">¿Primera vez? Crear cuenta →</a>
  </div>
</div>
</body>
</html>
