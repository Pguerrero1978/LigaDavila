{% extends 'base.html' %}
{% block title %}{{ 'Editar' if serie else 'Nueva' }} Serie{% endblock %}
{% block topbar_title %}{{ 'EDITAR SERIE' if serie else 'NUEVA SERIE' }}{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('series.index') }}" class="btn btn-secondary">← Volver</a>{% endblock %}
{% block content %}
<div style="max-width:540px">
<div class="card">
  <div class="card-header"><span class="card-title">DATOS DE LA SERIE</span></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Código *</label>
          <input type="text" name="codigo" required placeholder="Ej: A1" maxlength="10"
            value="{{ serie.codigo if serie else '' }}">
        </div>
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" name="nombre" required placeholder="Ej: Primera Adulta"
            value="{{ serie.nombre if serie else '' }}">
        </div>
        <div class="form-group">
          <label>Año *</label>
          <input type="number" name="año" required min="2000" max="2099"
            value="{{ serie.año if serie else año_actual }}">
        </div>
        <div class="form-group">
          <label>Categoría de edad</label>
          <select name="categoria">
            <option value="">General</option>
            {% for cat in ['Sub-8','Sub-10','Sub-12','Sub-14','Sub-16','Sub-18','Adultos','Máster'] %}
            <option value="{{ cat }}" {{ 'selected' if serie and serie.categoria == cat else '' }}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button type="submit" class="btn btn-primary">{{ '💾 Guardar cambios' if serie else '+ Crear serie' }}</button>
        <a href="{{ url_for('series.index') }}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
