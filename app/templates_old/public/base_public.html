<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Liga Control{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro: #f0f2f5;
      --carbon: #ffffff;
      --grafito: #e8eaed;
      --borde: #d1d5db;
      --texto: #111827;
      --muted: #6b7280;
      --verde: #008c3a;
      --verde-dim: #d1fae5;
      --acento: #b45309;
      --rojo: #dc2626;
      --azul: #1d4ed8;
      --f-title: 'Oswald', sans-serif;
      --f-body: 'Source Serif 4', serif;
      --f-mono: 'DM Mono', monospace;
      --nav-h: 64px;
      --max-w: 1200px;
      --radius: 8px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--f-body); background: var(--negro); color: var(--texto); min-height: 100vh; }

    /* ── NAVBAR ─────────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--borde);
      height: var(--nav-h);
    }
    .nav-inner {
      max-width: var(--max-w); margin: 0 auto;
      display: flex; align-items: center; gap: 0;
      height: 100%; padding: 0 24px;
    }
    .nav-logo {
      font-family: var(--f-title); font-size: 22px; font-weight: 700;
      color: var(--acento); letter-spacing: 3px; text-decoration: none;
      margin-right: 32px; white-space: nowrap;
    }
    .nav-logo span { color: var(--verde); }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-link {
      font-family: var(--f-title); font-size: 13px; font-weight: 400;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      padding: 8px 14px; border-radius: 6px;
      transition: color .15s, background .15s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--texto); background: var(--grafito); }
    .nav-link.active { color: var(--verde); }
    .nav-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    .nav-admin {
      font-family: var(--f-title); font-size: 11px; font-weight: 500;
      letter-spacing: 1px; color: var(--muted); text-decoration: none;
      border: 1px solid var(--borde); padding: 6px 14px; border-radius: 6px;
      transition: all .15s;
    }
    .nav-admin:hover { color: var(--verde); border-color: var(--verde); }

    /* ── LAYOUT ──────────────────────────────── */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }
    .page-wrap { padding: 40px 0 80px; }

    /* ── HERO TICKET ─────────────────────────── */
    .hero { background: var(--carbon); border-bottom: 1px solid var(--borde); padding: 0; overflow: hidden; position: relative; }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg, transparent, transparent 40px,
        rgba(0,0,0,.025) 40px, rgba(0,0,0,.025) 41px
      );
      pointer-events: none;
    }

    /* ── CARDS ───────────────────────────────── */
    .card {
      background: var(--carbon); border: 1px solid var(--borde);
      border-radius: var(--radius); overflow: hidden;
    }
    .card-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; border-bottom: 1px solid var(--borde);
    }
    .card-title {
      font-family: var(--f-title); font-size: 14px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; color: var(--texto);
    }
    .card-body { padding: 20px; }

    /* ── SECTION HEADING ─────────────────────── */
    .section-head {
      display: flex; align-items: baseline; gap: 14px;
      margin-bottom: 22px; padding-bottom: 14px;
      border-bottom: 1px solid var(--borde);
    }
    .section-title {
      font-family: var(--f-title); font-size: 28px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .section-line {
      flex: 1; height: 1px; background: linear-gradient(90deg, var(--verde), transparent);
    }
    .section-link {
      font-family: var(--f-title); font-size: 11px; letter-spacing: 1px;
      color: var(--verde); text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .section-link:hover { border-bottom-color: var(--verde); }

    /* ── BUTTONS ─────────────────────────────── */
    .btn {
      font-family: var(--f-title); font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; font-size: 12px;
      padding: 9px 20px; border-radius: 6px; cursor: pointer;
      border: none; text-decoration: none; display: inline-flex;
      align-items: center; gap: 7px; transition: all .15s;
    }
    .btn-primary { background: var(--verde); color: #000; }
    .btn-primary:hover { background: #00a846; }
    .btn-outline { background: transparent; color: var(--texto); border: 1px solid var(--borde); }
    .btn-outline:hover { border-color: var(--verde); color: var(--verde); }
    .btn-sm { padding: 6px 14px; font-size: 11px; }

    /* ── BADGE ───────────────────────────────── */
    .badge {
      font-family: var(--f-title); font-size: 10px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 4px; white-space: nowrap;
    }
    .b-green  { background: rgba(0,140,58,.12); color: var(--verde); border: 1px solid rgba(0,140,58,.2); }
    .b-amber  { background: rgba(180,83,9,.1); color: var(--acento); border: 1px solid rgba(180,83,9,.2); }
    .b-red    { background: rgba(220,38,38,.1); color: var(--rojo); border: 1px solid rgba(220,38,38,.2); }
    .b-gray   { background: rgba(0,0,0,.06); color: var(--muted); border: 1px solid var(--borde); }
    .b-blue   { background: rgba(29,78,216,.1); color: var(--azul); border: 1px solid rgba(29,78,216,.2); }

    /* ── TABLE ───────────────────────────────── */
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th {
      font-family: var(--f-title); font-size: 10px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
      padding: 10px 14px; text-align: left;
      border-bottom: 1px solid var(--borde); white-space: nowrap;
    }
    .tbl td {
      padding: 12px 14px; border-bottom: 1px solid rgba(0,0,0,.06);
      font-size: 14px; color: #374151; vertical-align: middle;
    }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: rgba(0,0,0,.025); }
    .tbl .num { font-family: var(--f-mono); text-align: center; }

    /* ── MATCH CARD ──────────────────────────── */
    .match {
      background: var(--carbon); border: 1px solid var(--borde);
      border-radius: var(--radius); padding: 18px 22px; margin-bottom: 10px;
      transition: border-color .2s;
    }
    .match:hover { border-color: rgba(0,140,58,.35); }
    .match-meta { font-size: 11px; color: var(--muted); margin-bottom: 14px; display: flex; gap: 12px; align-items: center; }
    .match-body { display: flex; align-items: center; gap: 16px; }
    .match-team { flex: 1; }
    .match-name { font-family: var(--f-title); font-size: 18px; font-weight: 600; letter-spacing: .5px; }
    .match-score {
      font-family: var(--f-title); font-size: 38px; font-weight: 700;
      color: var(--acento); letter-spacing: 8px;
      min-width: 100px; text-align: center;
    }
    .match-score.pending { color: var(--muted); font-size: 18px; letter-spacing: 4px; }

    /* ── PLAYER CARD ─────────────────────────── */
    .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .player-card {
      background: var(--carbon); border: 1px solid var(--borde);
      border-radius: var(--radius); padding: 20px 16px; text-align: center;
      text-decoration: none; color: inherit;
      transition: border-color .2s, transform .2s;
    }
    .player-card:hover { border-color: var(--verde); transform: translateY(-2px); }
    .player-avatar {
      width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 12px;
      overflow: hidden; border: 2px solid var(--borde);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-title); font-size: 24px; font-weight: 700;
      color: var(--verde); background: var(--verde-dim);
    }
    .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .player-name { font-family: var(--f-title); font-size: 15px; font-weight: 600; letter-spacing: .5px; margin-bottom: 4px; }
    .player-pos  { font-size: 12px; color: var(--muted); }

    /* ── RANK TABLE ──────────────────────────── */
    .rank-num { font-family: var(--f-title); font-size: 20px; font-weight: 700; color: #9ca3af; min-width: 28px; }
    .rank-1 { color: var(--acento) !important; }
    .rank-2 { color: #b0b0b0 !important; }
    .rank-3 { color: #a0714a !important; }

    /* ── NEWS CARD ───────────────────────────── */
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
    .news-card {
      background: var(--carbon); border: 1px solid var(--borde); border-radius: var(--radius);
      overflow: hidden; text-decoration: none; color: inherit;
      transition: border-color .2s; display: flex; flex-direction: column;
    }
    .news-card:hover { border-color: rgba(0,140,58,.4); }
    .news-img { width: 100%; height: 180px; object-fit: cover; background: var(--grafito); display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .news-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; }
    .news-cat { font-family: var(--f-title); font-size: 10px; letter-spacing: 2px; color: var(--verde); margin-bottom: 8px; }
    .news-title { font-family: var(--f-title); font-size: 17px; font-weight: 600; letter-spacing: .5px; line-height: 1.3; margin-bottom: 8px; }
    .news-excerpt { font-size: 13px; color: var(--muted); line-height: 1.6; flex: 1; }
    .news-date { font-size: 11px; color: var(--muted); margin-top: 12px; font-family: var(--f-mono); }

    /* ── STAT CARD ───────────────────────────── */
    .stat-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat-box {
      background: var(--grafito); border: 1px solid var(--borde);
      border-radius: var(--radius); padding: 18px 20px;
    }
    .stat-label { font-family: var(--f-title); font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
    .stat-val   { font-family: var(--f-title); font-size: 38px; font-weight: 700; line-height: 1; }
    .sv-g { color: var(--verde); }
    .sv-a { color: var(--acento); }
    .sv-r { color: var(--rojo); }
    .sv-w { color: var(--texto); }

    /* ── TIMELINE ────────────────────────────── */
    .timeline-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .timeline-min { font-family: var(--f-title); font-size: 20px; color: var(--acento); min-width: 40px; }
    .timeline-icon { font-size: 18px; margin-top: 2px; }
    .timeline-info { flex: 1; }
    .timeline-tipo { font-family: var(--f-title); font-size: 12px; letter-spacing: 1px; color: #1f2937; }
    .timeline-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── FILTERS ─────────────────────────────── */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
    .filters select, .filters input {
      background: var(--grafito); border: 1px solid var(--borde); border-radius: 6px;
      color: var(--texto); font-family: var(--f-body); font-size: 13px;
      padding: 8px 12px; min-width: 160px;
    }
    .filters select:focus, .filters input:focus { outline: none; border-color: var(--verde); }

    /* ── EMPTY ───────────────────────────────── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-text { font-family: var(--f-title); font-size: 14px; letter-spacing: 1px; }

    /* ── FOOTER ──────────────────────────────── */
    footer {
      background: #e9ecef; border-top: 1px solid var(--borde);
      padding: 22px 14px; text-align: center;
    }
    .footer-logo { font-family: var(--f-title); font-size: 18px; color: var(--verde); letter-spacing: 3px; margin-bottom: 8px; }
    .footer-text { font-size: 12px; color: var(--muted); }

    /* ── ANIMATIONS ──────────────────────────── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    .fade-up { animation: fadeUp .5s ease both; }
    .fade-up-2 { animation: fadeUp .5s ease .1s both; }
    .fade-up-3 { animation: fadeUp .5s ease .2s both; }

    /* ── MOBILE ──────────────────────────────── */
    @media (max-width: 768px) {
      .nav-links .nav-link { display: none; }
      .nav-links .nav-link:nth-child(-n+4) { display: flex; }
      .section-title { font-size: 20px; }
      .player-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .match-score { font-size: 28px; letter-spacing: 4px; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="{{ url_for('public.home') }}" class="nav-logo">LIGA<span>DAVILA</span></a>
    <div class="nav-links">
      <a href="{{ url_for('public.home') }}" class="nav-link {% if request.endpoint == 'public.home' %}active{% endif %}">Inicio</a>
      <a href="{{ url_for('public.partidos') }}" class="nav-link {% if request.blueprint == 'public' and 'partido' in request.endpoint %}active{% endif %}">Partidos</a>
      <a href="{{ url_for('public.tabla') }}" class="nav-link {% if request.endpoint == 'public.tabla' %}active{% endif %}">Tabla</a>
      <a href="{{ url_for('public.equipos') }}" class="nav-link {% if 'equipo' in request.endpoint %}active{% endif %}">Equipos</a>
      <a href="{{ url_for('public.jugadores') }}" class="nav-link {% if 'jugador' in request.endpoint %}active{% endif %}">Jugadores</a>
      <a href="{{ url_for('public.estadisticas') }}" class="nav-link {% if request.endpoint == 'public.estadisticas' %}active{% endif %}">Estadísticas</a>
      <a href="{{ url_for('public.noticias') }}" class="nav-link {% if 'noticia' in request.endpoint %}active{% endif %}">Noticias</a>
    </div>
    <div class="nav-right">
      <a href="{{ url_for('auth.login') }}" class="nav-admin">Admin →</a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <div class="footer-logo">LIGA DAVILA</div>
  <div class="footer-text">Portal oficial de la liga Dávila - Temporada {{ now.year if now else 2025 }}</div>
</footer>

<script>
  // Inyectar año actual en footer
  document.querySelectorAll('.footer-text').forEach(el => {
    el.textContent = el.textContent.replace(/\d{4}/, new Date().getFullYear());
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
